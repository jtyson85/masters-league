<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master's League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>body { background: #0f172a; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { Trophy, Calendar, Users, TrendingUp, Shield, Repeat, Star, Lock, Save, Mail, Plus, X, Check } = lucide;

    const CONFIG = { 
      regularSeasonWeeks: 13,
      commissionerPassword: "masters2025",
      commissionerEmail: "joshtyson85@gmail.com"
    };

    const storage = {
      get: async (key) => {
        try {
          const result = await window.storage.get(key);
          return result ? JSON.parse(result.value) : null;
        } catch { return null; }
      },
      set: async (key, value) => {
        try {
          await window.storage.set(key, JSON.stringify(value));
          return true;
        } catch { return false; }
      }
    };

    const Icon = ({ icon, className }) => {
      const IconComponent = icon;
      return <IconComponent className={className} />;
    };

    function calculateStandings(teams, weeklyData, schedule) {
      const standings = {};
      teams.forEach(t => {
        standings[t.id] = { ...t, totalVP: 0, h2hVP: 0, ptsVP: 0, totalPts: 0, wins: 0, losses: 0, ties: 0 };
      });
      weeklyData.forEach(week => {
        const scores = week.scores;
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const processMatchup = (home, away) => {
          const hs = scores[home] || scores[String(home)];
          const as = scores[away] || scores[String(away)];
          if (hs > as) { standings[home].h2hVP += 2; standings[home].wins += 1; standings[away].losses += 1; }
          else if (as > hs) { standings[away].h2hVP += 2; standings[away].wins += 1; standings[home].losses += 1; }
          else { standings[home].h2hVP += 1; standings[away].h2hVP += 1; standings[home].ties += 1; standings[away].ties += 1; }
        };
        week.espnMatchups.forEach(([h, a]) => processMatchup(h, a));
        const weekSchedule = schedule[String(week.week)];
        if (weekSchedule) weekSchedule.forEach(([h, a]) => processMatchup(h, a));
        sorted.forEach(([id], rank) => {
          const tid = parseInt(id);
          if (rank < 3) standings[tid].ptsVP += 2;
          else if (rank < 6) standings[tid].ptsVP += 1;
        });
        Object.keys(standings).forEach(id => {
          const tid = parseInt(id);
          const score = scores[tid] || scores[String(tid)] || 0;
          standings[tid].totalPts += score;
        });
      });
      Object.values(standings).forEach(t => { t.totalVP = t.h2hVP + t.ptsVP; });
      return Object.values(standings).sort((a, b) => b.totalVP - a.totalVP || b.totalPts - a.totalPts);
    }

    function TradeCenter({ teams }) {
      const [selectedTeam, setSelectedTeam] = useState('');
      const [tradePartner, setTradePartner] = useState('');
      const [offeredPlayers, setOfferedPlayers] = useState('');
      const [requestedPlayers, setRequestedPlayers] = useState('');
      const [message, setMessage] = useState('');
      const [pendingTrades, setPendingTrades] = useState([]);

      useEffect(() => {
        storage.get('pending-trades').then(trades => {
          if (trades) setPendingTrades(trades);
        });
      }, []);

      const handleSubmit = async () => {
        if (!selectedTeam || !tradePartner || !offeredPlayers || !requestedPlayers) {
          alert('Please fill in all fields');
          return;
        }

        const trade = {
          id: Date.now(),
          from: teams.find(t => t.id === parseInt(selectedTeam)),
          to: teams.find(t => t.id === parseInt(tradePartner)),
          offered: offeredPlayers,
          requested: requestedPlayers,
          message,
          date: new Date().toISOString(),
          status: 'pending'
        };

        const updated = [...pendingTrades, trade];
        await storage.set('pending-trades', updated);
        setPendingTrades(updated);

        const emailBody = `TRADE PROPOSAL

From: ${trade.from.name} (${trade.from.owner})
To: ${trade.to.name} (${trade.to.owner})

${trade.from.name} gives: ${trade.offered}
${trade.to.name} gives: ${trade.requested}

Message: ${message || 'None'}

Please approve or reject this trade.`;

        window.location.href = `mailto:${CONFIG.commissionerEmail}?subject=Trade Proposal&body=${encodeURIComponent(emailBody)}`;

        setOfferedPlayers('');
        setRequestedPlayers('');
        setMessage('');
        alert('Trade proposal sent!');
      };

      return (
        <div className="space-y-6">
          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2">
              <Icon icon={Repeat} className="w-5 h-5" /> Propose Trade
            </h3>
            
            <div className="space-y-4">
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Your Team</label>
                  <select value={selectedTeam} onChange={(e) => setSelectedTeam(e.target.value)}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white">
                    <option value="">Select your team</option>
                    {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Trade Partner</label>
                  <select value={tradePartner} onChange={(e) => setTradePartner(e.target.value)}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white">
                    <option value="">Select partner</option>
                    {teams.filter(t => t.id !== parseInt(selectedTeam)).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm text-slate-400 mb-2">You Give Up</label>
                <textarea value={offeredPlayers} onChange={(e) => setOfferedPlayers(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"
                  rows="3" placeholder="e.g., Patrick Mahomes, Travis Kelce"/>
              </div>

              <div>
                <label className="block text-sm text-slate-400 mb-2">You Receive</label>
                <textarea value={requestedPlayers} onChange={(e) => setRequestedPlayers(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"
                  rows="3" placeholder="e.g., Josh Allen, Stefon Diggs"/>
              </div>

              <div>
                <label className="block text-sm text-slate-400 mb-2">Message (Optional)</label>
                <textarea value={message} onChange={(e) => setMessage(e.target.value)}
                  className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"
                  rows="2" placeholder="Add a message..."/>
              </div>

              <button onClick={handleSubmit}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg flex items-center justify-center gap-2">
                <Icon icon={Mail} className="w-4 h-4" /> Submit Trade Proposal
              </button>
            </div>
          </div>

          {pendingTrades.filter(t => t.status === 'pending').length > 0 && (
            <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
              <h3 className="text-lg font-semibold text-white mb-4">Pending Trades</h3>
              <div className="space-y-3">
                {pendingTrades.filter(t => t.status === 'pending').map(trade => (
                  <div key={trade.id} className="bg-slate-900/50 rounded p-3">
                    <div className="text-white font-medium">{trade.from.name} ↔ {trade.to.name}</div>
                    <div className="text-sm text-slate-400 mt-1">{trade.offered} ⟷ {trade.requested}</div>
                    <div className="text-xs text-yellow-500 mt-1">⏳ Awaiting approval</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function KeeperTracker({ teams, isCommissioner }) {
      const [keepers, setKeepers] = useState({});
      const [keeperSettings, setKeeperSettings] = useState({ maxKeepers: 2, penaltyRounds: 1 });
      const [editingTeam, setEditingTeam] = useState(null);
      const [newKeeper, setNewKeeper] = useState({ player: '', round: '' });

      useEffect(() => {
        storage.get('keepers').then(k => { if (k) setKeepers(k); });
        storage.get('keeper-settings').then(s => { if (s) setKeeperSettings(s); });
      }, []);

      const saveKeepers = async () => {
        await storage.set('keepers', keepers);
        alert('Keepers saved!');
      };

      const saveSettings = async () => {
        await storage.set('keeper-settings', keeperSettings);
        alert('Settings saved!');
      };

      const addKeeper = (teamId) => {
        if (!newKeeper.player || !newKeeper.round) return;
        const updated = { ...keepers };
        if (!updated[teamId]) updated[teamId] = [];
        updated[teamId].push({ ...newKeeper, year: new Date().getFullYear() });
        setKeepers(updated);
        setNewKeeper({ player: '', round: '' });
      };

      const removeKeeper = (teamId, idx) => {
        const updated = { ...keepers };
        updated[teamId].splice(idx, 1);
        setKeepers(updated);
      };

      if (isCommissioner) {
        return (
          <div className="space-y-6">
            <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
              <h3 className="text-lg font-semibold text-white mb-4">Keeper Settings</h3>
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Max Keepers Per Team</label>
                  <input type="number" value={keeperSettings.maxKeepers}
                    onChange={(e) => setKeeperSettings({...keeperSettings, maxKeepers: parseInt(e.target.value)})}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"/>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Draft Round Penalty</label>
                  <input type="number" value={keeperSettings.penaltyRounds}
                    onChange={(e) => setKeeperSettings({...keeperSettings, penaltyRounds: parseInt(e.target.value)})}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"/>
                </div>
              </div>
              <button onClick={saveSettings} className="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center gap-2">
                <Icon icon={Save} className="w-4 h-4" /> Save Settings
              </button>
            </div>

            <div className="space-y-4">
              {teams.map(team => (
                <div key={team.id} className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <div className="font-medium text-white">{team.name}</div>
                      <div className="text-sm text-slate-400">{team.owner}</div>
                    </div>
                    <button onClick={() => setEditingTeam(editingTeam === team.id ? null : team.id)}
                      className="text-blue-400 hover:text-blue-300 text-sm">
                      {editingTeam === team.id ? 'Close' : 'Edit'}
                    </button>
                  </div>

                  {keepers[team.id]?.map((keeper, idx) => (
                    <div key={idx} className="flex items-center justify-between py-2 border-t border-slate-700">
                      <div className="text-white">{keeper.player} <span className="text-slate-400 text-sm">(Rd {keeper.round})</span></div>
                      {editingTeam === team.id && (
                        <button onClick={() => removeKeeper(team.id, idx)} className="text-red-400 hover:text-red-300">
                          <Icon icon={X} className="w-4 h-4" />
                        </button>
                      )}
                    </div>
                  ))}

                  {editingTeam === team.id && (
                    <div className="mt-3 flex gap-2">
                      <input type="text" placeholder="Player name" value={newKeeper.player}
                        onChange={(e) => setNewKeeper({...newKeeper, player: e.target.value})}
                        className="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white text-sm"/>
                      <input type="number" placeholder="Round" value={newKeeper.round}
                        onChange={(e) => setNewKeeper({...newKeeper, round: e.target.value})}
                        className="w-20 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white text-sm"/>
                      <button onClick={() => addKeeper(team.id)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded">
                        <Icon icon={Plus} className="w-4 h-4" />
                      </button>
                    </div>
                  )}

                  {!keepers[team.id] || keepers[team.id].length === 0 ? (
                    <div className="text-slate-500 text-sm py-2">No keepers selected</div>
                  ) : null}
                </div>
              ))}
            </div>

            <button onClick={saveKeepers} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg flex items-center justify-center gap-2">
              <Icon icon={Save} className="w-5 h-5" /> Save All Keepers
            </button>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-2">Keeper Rules</h3>
            <div className="text-slate-300 space-y-1">
              <div>• Max keepers: <strong>{keeperSettings.maxKeepers}</strong></div>
              <div>• Penalty: <strong>{keeperSettings.penaltyRounds} round(s) earlier</strong></div>
            </div>
          </div>

          <div className="space-y-4">
            {teams.map(team => (
              <div key={team.id} className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                <div className="font-medium text-white mb-2">{team.name}</div>
                {keepers[team.id] && keepers[team.id].length > 0 ? (
                  keepers[team.id].map((keeper, idx) => (
                    <div key={idx} className="flex items-center gap-2 py-1">
                      <Icon icon={Star} className="w-4 h-4 text-yellow-500" />
                      <span className="text-white">{keeper.player}</span>
                      <span className="text-slate-400 text-sm">(Rd {keeper.round})</span>
                    </div>
                  ))
                ) : (
                  <div className="text-slate-500 text-sm">No keepers selected</div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Commissioner({ teams }) {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [password, setPassword] = useState('');
      const [pendingTrades, setPendingTrades] = useState([]);
      const [generatedSchedule, setGeneratedSchedule] = useState(null);

      useEffect(() => {
        if (isAuthenticated) {
          storage.get('pending-trades').then(trades => {
            if (trades) setPendingTrades(trades);
          });
        }
      }, [isAuthenticated]);

      const handleAuth = () => {
        if (password === CONFIG.commissionerPassword) {
          setIsAuthenticated(true);
        } else {
          alert('Incorrect password');
        }
      };

      const generateSchedule = () => {
        const teamIds = teams.map(t => t.id);
        const n = teamIds.length;
        const schedule = {};
        
        for (let week = 1; week <= 13; week++) {
          const round = (week - 1) % (n - 1);
          const rotated = [teamIds[0], ...teamIds.slice(1).slice(-round).concat(teamIds.slice(1).slice(0, -round || undefined))];
          const matchups = [];
          for (let i = 0; i < n / 2; i++) {
            if (rotated[i] && rotated[n - 1 - i]) {
              matchups.push([rotated[i], rotated[n - 1 - i]]);
            }
          }
          schedule[week] = matchups;
        }
        
        setGeneratedSchedule(schedule);
      };

      const approveTrade = async (tradeId) => {
        const updated = pendingTrades.map(t => t.id === tradeId ? {...t, status: 'approved'} : t);
        await storage.set('pending-trades', updated);
        setPendingTrades(updated);
        alert('Trade approved!');
      };

      const rejectTrade = async (tradeId) => {
        const updated = pendingTrades.map(t => t.id === tradeId ? {...t, status: 'rejected'} : t);
        await storage.set('pending-trades', updated);
        setPendingTrades(updated);
        alert('Trade rejected');
      };

      if (!isAuthenticated) {
        return (
          <div className="max-w-md mx-auto mt-20">
            <div className="bg-slate-800/50 rounded-lg p-8 border border-slate-700">
              <div className="flex items-center justify-center mb-6">
                <Icon icon={Lock} className="w-12 h-12 text-slate-400" />
              </div>
              <h3 className="text-xl font-semibold text-white text-center mb-4">Commissioner Access</h3>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && handleAuth()}
                placeholder="Enter password"
                className="w-full bg-slate-900 border border-slate-700 rounded px-4 py-3 text-white mb-4"/>
              <button onClick={handleAuth}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg">
                Unlock
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-4">Schedule Generator</h3>
            <button onClick={generateSchedule}
              className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center gap-2">
              <Icon icon={Calendar} className="w-4 h-4" /> Generate Round-Robin
            </button>
            
            {generatedSchedule && (
              <div className="mt-4 bg-slate-900/50 rounded p-4 max-h-96 overflow-y-auto">
                <pre className="text-xs text-slate-300">{JSON.stringify(generatedSchedule, null, 2)}</pre>
                <button onClick={() => navigator.clipboard.writeText(JSON.stringify(generatedSchedule))}
                  className="mt-2 text-blue-400 text-sm">Copy to clipboard</button>
              </div>
            )}
          </div>

          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-4">Trade Approvals</h3>
            {pendingTrades.filter(t => t.status === 'pending').length === 0 ? (
              <div className="text-slate-400">No pending trades</div>
            ) : (
              <div className="space-y-4">
                {pendingTrades.filter(t => t.status === 'pending').map(trade => (
                  <div key={trade.id} className="bg-slate-900/50 rounded p-4">
                    <div className="flex items-start justify-between mb-3">
                      <div>
                        <div className="text-white font-medium">{trade.from.name} ↔ {trade.to.name}</div>
                        <div className="text-xs text-slate-500">{new Date(trade.date).toLocaleDateString()}</div>
                      </div>
                    </div>
                    <div className="grid md:grid-cols-2 gap-4 mb-3">
                      <div>
                        <div className="text-sm text-slate-400">{trade.from.name} gives:</div>
                        <div className="text-white">{trade.offered}</div>
                      </div>
                      <div>
                        <div className="text-sm text-slate-400">{trade.to.name} gives:</div>
                        <div className="text-white">{trade.requested}</div>
                      </div>
                    </div>
                    {trade.message && (
                      <div className="text-sm text-slate-400 mb-3">Message: {trade.message}</div>
                    )}
                    <div className="flex gap-2">
                      <button onClick={() => approveTrade(trade.id)}
                        className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded flex items-center justify-center gap-2">
                        <Icon icon={Check} className="w-4 h-4" /> Approve
                      </button>
                      <button onClick={() => rejectTrade(trade.id)}
                        className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded flex items-center justify-center gap-2">
                        <Icon icon={X} className="w-4 h-4" /> Reject
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function Standings({ projections }) {
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-700 text-slate-400">
              <th className="text-left py-3 px-2">Seed</th><th className="text-left py-3 px-2">Team</th>
              <th className="text-center py-3 px-2">VP</th><th className="text-center py-3 px-2 hidden sm:table-cell">H2H</th>
              <th className="text-center py-3 px-2 hidden sm:table-cell">Pts</th>
              <th className="text-center py-3 px-2 hidden md:table-cell">Record</th>
              <th className="text-right py-3 px-2">Total Pts</th>
            </tr></thead>
            <tbody>
              {projections.map((team, i) => (
                <tr key={team.id} className={`border-b border-slate-800 ${i < 4 ? 'bg-emerald-500/5' : i < 6 ? 'bg-yellow-500/5' : ''}`}>
                  <td className="py-3 px-2">
                    <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold ${i < 4 ? 'bg-emerald-500/20 text-emerald-400' : i < 6 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-slate-700 text-slate-400'}`}>{i + 1}</span>
                  </td>
                  <td className="py-3 px-2">
                    <div className="font-medium text-white">{team.name}</div>
                    <div className="text-xs text-slate-500">{team.owner}</div>
                  </td>
                  <td className="text-center py-3 px-2"><span className="text-lg font-bold text-white">{team.totalVP}</span></td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden sm:table-cell">{team.h2hVP}</td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden sm:table-cell">{team.ptsVP}</td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden md:table-cell">{team.wins}-{team.losses}{team.ties > 0 && `-${team.ties}`}</td>
                  <td className="text-right py-3 px-2 text-slate-300">{team.totalPts.toFixed(1)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('standings');

      useEffect(() => {
        fetch('data.json')
          .then(res => res.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      const standings = useMemo(() => {
        if (!data) return [];
        if (data.standings) return data.standings;
        return calculateStandings(data.teams, data.weeks, data.schedule);
      }, [data]);

      const projections = useMemo(() => {
        if (!data || !standings.length) return [];
        const weeksLeft = CONFIG.regularSeasonWeeks - (data.weeks?.length || 0);
        return standings.map((team, idx) => ({
          ...team,
          maxPossible: team.totalVP + (weeksLeft * 6),
          status: idx < 4 ? "Playoff" : idx < 6 ? "Bubble" : "Outside",
          seed: idx + 1
        }));
      }, [standings, data]);

      if (loading) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center">Loading...</div>;
      if (!data) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center">Failed to load</div>;

      const tabs = [
        { id: 'standings', label: 'Standings', icon: Users },
        { id: 'trades', label: 'Trades', icon: Repeat },
        { id: 'keepers', label: 'Keepers', icon: Star },
        { id: 'commissioner', label: 'Commissioner', icon: Shield }
      ];

      return (
        <div className="min-h-screen bg-slate-900 text-white p-3 md:p-6">
          <div className="max-w-4xl mx-auto">
            <div className="text-center mb-6">
              <h1 className="text-2xl md:text-3xl font-bold bg-gradient-to-r from-yellow-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">
                {data.leagueName}
              </h1>
              <p className="text-slate-400 mt-1">{data.year} Season</p>
            </div>

            <div className="flex gap-1 mb-6 bg-slate-800 p-1 rounded-lg overflow-x-auto">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setView(tab.id)}
                  className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium whitespace-nowrap ${view === tab.id ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}>
                  <Icon icon={tab.icon} className="w-4 h-4" />
                  <span className="hidden sm:inline">{tab.label}</span>
                </button>
              ))}
            </div>

            <div className="bg-slate-800/30 rounded-xl p-4 md:p-6 border border-slate-700">
              {view === 'standings' && <Standings projections={projections} />}
              {view === 'trades' && <TradeCenter teams={data.teams} />}
              {view === 'keepers' && <KeeperTracker teams={data.teams} isCommissioner={false} />}
              {view === 'commissioner' && <Commissioner teams={data.teams} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
