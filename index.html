<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master's League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body { background: #0f172a; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const CONFIG = { regularSeasonWeeks: 13, commissionerPassword: "masters2026" };

    const storage = {
      get: async (key) => {
        try {
          const result = await window.storage.get(key);
          return result ? JSON.parse(result.value) : null;
        } catch { return null; }
      },
      set: async (key, value) => {
        try {
          await window.storage.set(key, JSON.stringify(value));
          return true;
        } catch { return false; }
      }
    };

    function calculateStandings(teams, weeklyData, matchup1Schedule, matchup2Schedule) {
      const standings = {};
      teams.forEach(t => {
        standings[t.id] = { ...t, totalVP: 0, h2hVP: 0, ptsVP: 0, totalPts: 0, wins: 0, losses: 0, ties: 0 };
      });
      weeklyData.forEach(week => {
        const scores = week.scores;
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const processMatchup = (home, away) => {
          const hs = scores[home] || scores[String(home)];
          const as = scores[away] || scores[String(away)];
          if (hs > as) { standings[home].h2hVP += 2; standings[home].wins += 1; standings[away].losses += 1; }
          else if (as > hs) { standings[away].h2hVP += 2; standings[away].wins += 1; standings[home].losses += 1; }
          else { standings[home].h2hVP += 1; standings[away].h2hVP += 1; standings[home].ties += 1; standings[away].ties += 1; }
        };
        const weekStr = String(week.week);
        if (matchup1Schedule[weekStr]) matchup1Schedule[weekStr].forEach(([h, a]) => processMatchup(h, a));
        if (matchup2Schedule[weekStr]) matchup2Schedule[weekStr].forEach(([h, a]) => processMatchup(h, a));
        sorted.forEach(([id], rank) => {
          const tid = parseInt(id);
          if (rank < 3) standings[tid].ptsVP += 2;
          else if (rank < 6) standings[tid].ptsVP += 1;
        });
        Object.keys(standings).forEach(id => {
          const tid = parseInt(id);
          const score = scores[tid] || scores[String(tid)] || 0;
          standings[tid].totalPts += score;
        });
      });
      Object.values(standings).forEach(t => { t.totalVP = t.h2hVP + t.ptsVP; });
      return Object.values(standings).sort((a, b) => b.totalVP - a.totalVP || b.totalPts - a.totalPts);
    }

    function Standings({ projections, hasData }) {
      if (!hasData || projections.length === 0) {
        return (
          <div className="text-center py-12">
            <div className="text-6xl mb-4">🏈</div>
            <h3 className="text-xl font-semibold text-white mb-2">2026 Season Coming Soon</h3>
            <p className="text-slate-400">Standings will appear once Week 1 games are played</p>
          </div>
        );
      }
      
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-slate-700 text-slate-400">
              <th className="text-left py-3 px-2">Seed</th><th className="text-left py-3 px-2">Team</th>
              <th className="text-center py-3 px-2">VP</th><th className="text-center py-3 px-2 hidden sm:table-cell">H2H</th>
              <th className="text-center py-3 px-2 hidden sm:table-cell">Pts</th>
              <th className="text-center py-3 px-2 hidden md:table-cell">Record</th>
              <th className="text-right py-3 px-2">Total Pts</th>
            </tr></thead>
            <tbody>
              {projections.map((team, i) => (
                <tr key={team.id} className={`border-b border-slate-800 ${i < 4 ? 'bg-emerald-500/5' : i < 6 ? 'bg-yellow-500/5' : ''}`}>
                  <td className="py-3 px-2">
                    <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold ${i < 4 ? 'bg-emerald-500/20 text-emerald-400' : i < 6 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-slate-700 text-slate-400'}`}>{i + 1}</span>
                  </td>
                  <td className="py-3 px-2">
                    <div className="font-medium text-white">{team.name}</div>
                    <div className="text-xs text-slate-500">{team.owner}</div>
                  </td>
                  <td className="text-center py-3 px-2"><span className="text-lg font-bold text-white">{team.totalVP}</span></td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden sm:table-cell">{team.h2hVP}</td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden sm:table-cell">{team.ptsVP}</td>
                  <td className="text-center py-3 px-2 text-slate-300 hidden md:table-cell">{team.wins}-{team.losses}{team.ties > 0 && `-${team.ties}`}</td>
                  <td className="text-right py-3 px-2 text-slate-300">{team.totalPts.toFixed(1)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-6 p-4 bg-slate-800/50 rounded-lg border border-slate-700">
            <h4 className="text-sm font-medium text-slate-300 mb-2">Victory Points Scoring</h4>
            <div className="grid grid-cols-2 gap-4 text-xs text-slate-400">
              <div><div className="font-medium text-slate-300 mb-1">H2H (2 matchups/week)</div><div>Win: 2 VP • Tie: 1 VP</div></div>
              <div><div className="font-medium text-slate-300 mb-1">Weekly Points</div><div>1st-3rd: 2 VP • 4th-6th: 1 VP</div></div>
            </div>
          </div>
        </div>
      );
    }

    function KeeperTracker({ teams }) {
      const [keepers, setKeepers] = useState({});
      const [settings, setSettings] = useState({ maxKeepers: 3, deadline: '2026-08-15' });
      const [budgets, setBudgets] = useState({});
      const [isCommish, setIsCommish] = useState(false);
      const [password, setPassword] = useState('');
      const [editTeam, setEditTeam] = useState(null);
      const [newKeeper, setNewKeeper] = useState({ player: '', cost: '' });

      useEffect(() => {
        storage.get('keepers-2026').then(k => { if (k) setKeepers(k); });
        storage.get('keeper-settings-2026').then(s => { if (s) setSettings(s); });
        storage.get('team-budgets-2026').then(b => { 
          if (b) {
            setBudgets(b);
          } else {
            // Initialize all teams with $200
            const initial = {};
            teams.forEach(t => { initial[t.id] = 200; });
            setBudgets(initial);
          }
        });
      }, [teams]);

      const saveAll = async () => {
        await storage.set('keepers-2026', keepers);
        await storage.set('keeper-settings-2026', settings);
        await storage.set('team-budgets-2026', budgets);
        alert('Saved!');
      };

      const addKeeper = (teamId) => {
        if (!newKeeper.player || !newKeeper.cost) {
          alert('Enter player name and cost');
          return;
        }
        const updated = { ...keepers };
        if (!updated[teamId]) updated[teamId] = [];
        if (updated[teamId].length >= settings.maxKeepers) {
          alert(`Max ${settings.maxKeepers} keepers per team`);
          return;
        }
        updated[teamId].push({ player: newKeeper.player, cost: parseInt(newKeeper.cost) });
        setKeepers(updated);
        setNewKeeper({ player: '', cost: '' });
      };

      const removeKeeper = (teamId, idx) => {
        const updated = { ...keepers };
        updated[teamId].splice(idx, 1);
        setKeepers(updated);
      };

      const updateBudget = (teamId, newBudget) => {
        const updated = { ...budgets };
        updated[teamId] = parseInt(newBudget);
        setBudgets(updated);
      };

      const handleAuth = () => {
        if (password === CONFIG.commissionerPassword) {
          setIsCommish(true);
        } else {
          alert('Wrong password');
        }
      };

      const getSpentAndRemaining = (teamId) => {
        const teamKeepers = keepers[teamId] || [];
        const spent = teamKeepers.reduce((sum, k) => sum + k.cost, 0);
        const budget = budgets[teamId] || 200;
        const remaining = budget - spent;
        return { spent, remaining, budget };
      };

      return (
        <div className="space-y-6">
          {/* Commissioner Login */}
          {!isCommish && (
            <div className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
              <div className="flex items-center justify-between">
                <div>
                  <h4 className="text-white font-medium">Commissioner Controls</h4>
                  <div className="text-sm text-slate-400">Manage keepers and budgets</div>
                </div>
                <div className="flex gap-2">
                  <input type="password" placeholder="Password" value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleAuth()}
                    className="bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white text-sm"/>
                  <button onClick={handleAuth} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">
                    🔓 Unlock
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Settings */}
          {isCommish && (
            <div className="bg-slate-800/50 rounded-lg p-6 border border-emerald-500/30">
              <h3 className="text-lg font-semibold text-white mb-4">⚙️ Keeper Settings</h3>
              <div className="grid md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Max Keepers Per Team</label>
                  <input type="number" value={settings.maxKeepers}
                    onChange={(e) => setSettings({...settings, maxKeepers: parseInt(e.target.value)})}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"/>
                </div>
                <div>
                  <label className="block text-sm text-slate-400 mb-2">Keeper Deadline</label>
                  <input type="date" value={settings.deadline}
                    onChange={(e) => setSettings({...settings, deadline: e.target.value})}
                    className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"/>
                </div>
              </div>
              <button onClick={saveAll} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded">
                💾 Save Settings
              </button>
            </div>
          )}

          {/* Rules */}
          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-3">📋 2026 Keeper Rules (Auction)</h3>
            <div className="text-slate-300 space-y-2">
              <div>• Maximum keepers per team: <strong>{settings.maxKeepers}</strong></div>
              <div>• Keeper deadline: <strong>{new Date(settings.deadline).toLocaleDateString()}</strong></div>
              <div>• Keeper cost: <strong>2025 price + $5</strong></div>
              <div>• Base auction budget: <strong>$200</strong> (adjustable per team)</div>
              <div className="text-sm text-slate-400 mt-3">
                Example: Player drafted for $15 in 2025 → costs $20 to keep in 2026
              </div>
            </div>
          </div>

          {/* Team Lists */}
          <div className="space-y-4">
            {teams.map(team => {
              const teamKeepers = keepers[team.id] || [];
              const { spent, remaining, budget } = getSpentAndRemaining(team.id);
              
              return (
                <div key={team.id} className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <div className="font-medium text-white">{team.name}</div>
                      <div className="text-sm text-slate-400">{team.owner}</div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="text-right">
                        <div className="text-xs text-slate-500">Budget</div>
                        <div className={`text-sm font-medium ${remaining < 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                          ${remaining}
                        </div>
                      </div>
                      {isCommish && (
                        <button onClick={() => setEditTeam(editTeam === team.id ? null : team.id)}
                          className="text-blue-400 hover:text-blue-300 text-sm">
                          {editTeam === team.id ? '✖' : '✏️'}
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Budget adjustment (commissioner only) */}
                  {isCommish && editTeam === team.id && (
                    <div className="mb-3 p-3 bg-slate-900/50 rounded">
                      <label className="block text-sm text-slate-400 mb-2">Adjust Budget</label>
                      <input type="number" value={budgets[team.id] || 200}
                        onChange={(e) => updateBudget(team.id, e.target.value)}
                        className="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white"/>
                      <div className="text-xs text-slate-500 mt-1">
                        Current: ${budget} | Spent: ${spent} | Remaining: ${remaining}
                      </div>
                    </div>
                  )}

                  {/* Keepers */}
                  {teamKeepers.length > 0 ? (
                    <div className="space-y-2">
                      {teamKeepers.map((keeper, idx) => (
                        <div key={idx} className="flex items-center justify-between py-2 px-3 bg-slate-900/50 rounded">
                          <div className="flex items-center gap-3">
                            <span className="text-yellow-500">⭐</span>
                            <div className="text-white font-medium">{keeper.player}</div>
                            <div className="text-emerald-400 font-bold">${keeper.cost}</div>
                          </div>
                          {editTeam === team.id && (
                            <button onClick={() => removeKeeper(team.id, idx)}
                              className="text-red-400 hover:text-red-300 text-sm">
                              ✖
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-slate-500 text-sm text-center py-4">No keepers selected</div>
                  )}

                  {/* Add keeper (commissioner only) */}
                  {editTeam === team.id && (
                    <div className="mt-4 p-3 bg-slate-900/50 rounded border border-slate-600">
                      <div className="text-sm text-slate-400 mb-3">Add Keeper</div>
                      <div className="flex gap-2">
                        <input type="text" placeholder="Player name" value={newKeeper.player}
                          onChange={(e) => setNewKeeper({...newKeeper, player: e.target.value})}
                          className="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white text-sm"
                          onKeyPress={(e) => e.key === 'Enter' && addKeeper(team.id)}/>
                        <input type="number" placeholder="$$" value={newKeeper.cost}
                          onChange={(e) => setNewKeeper({...newKeeper, cost: e.target.value})}
                          className="w-24 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-white text-sm"/>
                        <button onClick={() => addKeeper(team.id)}
                          className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm">
                          ➕
                        </button>
                      </div>
                      <div className="text-xs text-slate-500 mt-2">
                        Keeper cost = last year's price + $5
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Summary */}
          <div className="bg-slate-800/50 rounded-lg p-6 border border-slate-700">
            <h3 className="text-lg font-semibold text-white mb-4">💰 Budget Summary</h3>
            <div className="grid md:grid-cols-2 gap-3">
              {teams.map(team => {
                const { spent, remaining, budget } = getSpentAndRemaining(team.id);
                return (
                  <div key={team.id} className="flex items-center justify-between py-2 px-3 bg-slate-900/50 rounded">
                    <div>
                      <div className="text-white text-sm">{team.abbrev}</div>
                      <div className="text-xs text-slate-500">${spent} spent</div>
                    </div>
                    <div className={`font-bold ${remaining < 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                      ${remaining}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Save button */}
          {isCommish && (
            <button onClick={saveAll}
              className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-medium">
              💾 Save All Keeper Data
            </button>
          )}
        </div>
      );
    }

    function WeeklyView({ data, selectedWeek, setSelectedWeek }) {
      // If no weeks played yet, show schedule preview
      if (!data.weeks || data.weeks.length === 0) {
        return (
          <div className="space-y-4">
            <div className="bg-blue-500/10 rounded-lg p-4 border border-blue-500/30 mb-4">
              <h4 className="text-blue-400 font-medium mb-2">ℹ️ Double-Header Schedule</h4>
              <p className="text-slate-300 text-sm">
                Each team plays <strong>TWO matchups every week</strong>. Both schedules are shown below and both count toward Victory Points.
              </p>
            </div>

            <div className="grid gap-4">
              {[...Array(13)].map((_, i) => {
                const week = i + 1;
                const m1 = data.scheduleMatchup1?.[String(week)] || [];
                const m2 = data.scheduleMatchup2?.[String(week)] || [];
                
                return (
                  <div key={week} className="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                    <div className="text-base font-medium text-white mb-3">Week {week}</div>
                    
                    <div className="grid md:grid-cols-2 gap-4">
                      <div>
                        <div className="text-xs text-blue-400 mb-2">MATCHUP 1</div>
                        <div className="space-y-1">
                          {m1.map(([h, a], idx) => {
                            const home = data.teams.find(t => t.id === h);
                            const away = data.teams.find(t => t.id === a);
                            return (
                              <div key={idx} className="bg-blue-500/10 rounded px-3 py-2 flex items-center justify-between">
                                <span className="text-white text-sm">{home?.abbrev}</span>
                                <span className="text-slate-500">vs</span>
                                <span className="text-white text-sm">{away?.abbrev}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      
                      <div>
                        <div className="text-xs text-purple-400 mb-2">MATCHUP 2</div>
                        <div className="space-y-1">
                          {m2.map(([h, a], idx) => {
                            const home = data.teams.find(t => t.id === h);
                            const away = data.teams.find(t => t.id === a);
                            return (
                              <div key={idx} className="bg-purple-500/10 rounded px-3 py-2 flex items-center justify-between">
                                <span className="text-white text-sm">{home?.abbrev}</span>
                                <span className="text-slate-500">vs</span>
                                <span className="text-white text-sm">{away?.abbrev}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      const weeks = data.weeks.map(w => w.week);
      const weekData = data.weeks.find(w => w.week === selectedWeek);
      if (!weekData) return <div className="text-slate-400 text-center py-8">No data for Week {selectedWeek}</div>;
      const scores = weekData.scores;
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      
      const matchup1List = [];
      const matchup2List = [];
      
      const m1Schedule = data.scheduleMatchup1?.[String(selectedWeek)] || [];
      const m2Schedule = data.scheduleMatchup2?.[String(selectedWeek)] || [];
      
      m1Schedule.forEach(([h, a]) => {
        matchup1List.push({ home: h, away: a, homeScore: scores[h] || scores[String(h)], awayScore: scores[a] || scores[String(a)] });
      });
      
      m2Schedule.forEach(([h, a]) => {
        matchup2List.push({ home: h, away: a, homeScore: scores[h] || scores[String(h)], awayScore: scores[a] || scores[String(a)] });
      });

      return (
        <div className="space-y-4">
          <div className="flex gap-2 overflow-x-auto pb-2">
            {weeks.map(w => (
              <button key={w} onClick={() => setSelectedWeek(w)}
                className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${selectedWeek === w ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                Wk {w}
              </button>
            ))}
          </div>

          <div className="grid lg:grid-cols-3 gap-4">
            {/* Matchup 1 */}
            <div>
              <h4 className="text-sm font-medium text-blue-400 mb-3">Matchup 1</h4>
              <div className="space-y-2">
                {matchup1List.map((m, i) => {
                  const home = data.teams.find(t => t.id === m.home);
                  const away = data.teams.find(t => t.id === m.away);
                  const homeWon = m.homeScore > m.awayScore;
                  const awayWon = m.awayScore > m.homeScore;
                  return (
                    <div key={i} className="bg-blue-500/10 rounded-lg p-3 border border-blue-500/30">
                      <div className={`flex justify-between mb-1 ${homeWon ? 'text-emerald-400' : 'text-slate-300'}`}>
                        <span className="text-sm">{home?.abbrev}</span>
                        <span className="font-bold">{m.homeScore?.toFixed(1)}</span>
                      </div>
                      <div className={`flex justify-between ${awayWon ? 'text-emerald-400' : 'text-slate-300'}`}>
                        <span className="text-sm">{away?.abbrev}</span>
                        <span className="font-bold">{m.awayScore?.toFixed(1)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Matchup 2 */}
            <div>
              <h4 className="text-sm font-medium text-purple-400 mb-3">Matchup 2</h4>
              <div className="space-y-2">
                {matchup2List.map((m, i) => {
                  const home = data.teams.find(t => t.id === m.home);
                  const away = data.teams.find(t => t.id === m.away);
                  const homeWon = m.homeScore > m.awayScore;
                  const awayWon = m.awayScore > m.homeScore;
                  return (
                    <div key={i} className="bg-purple-500/10 rounded-lg p-3 border border-purple-500/30">
                      <div className={`flex justify-between mb-1 ${homeWon ? 'text-emerald-400' : 'text-slate-300'}`}>
                        <span className="text-sm">{home?.abbrev}</span>
                        <span className="font-bold">{m.homeScore?.toFixed(1)}</span>
                      </div>
                      <div className={`flex justify-between ${awayWon ? 'text-emerald-400' : 'text-slate-300'}`}>
                        <span className="text-sm">{away?.abbrev}</span>
                        <span className="font-bold">{m.awayScore?.toFixed(1)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Points Ranking */}
            <div>
              <h4 className="text-sm font-medium text-slate-400 mb-3">Points Ranking</h4>
              <div className="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                {sorted.map(([id, score], i) => {
                  const team = data.teams.find(t => t.id === parseInt(id));
                  const vpEarned = i < 3 ? 2 : i < 6 ? 1 : 0;
                  return (
                    <div key={id} className={`flex items-center justify-between py-2 ${i < sorted.length - 1 ? 'border-b border-slate-700' : ''}`}>
                      <div className="flex items-center gap-2">
                        <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs ${i < 3 ? 'bg-emerald-500/20 text-emerald-400' : i < 6 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-slate-700 text-slate-400'}`}>{i + 1}</span>
                        <span className="text-white text-sm">{team?.abbrev}</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-slate-300 text-sm">{parseFloat(score).toFixed(1)}</span>
                        {vpEarned > 0 && <span className={`text-xs ${i < 3 ? 'text-emerald-400' : 'text-yellow-400'}`}>+{vpEarned}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('standings');
      const [selectedWeek, setSelectedWeek] = useState(1);

      useEffect(() => {
        fetch('data.json')
          .then(res => res.json())
          .then(d => { setData(d); setSelectedWeek(d.weeks?.length || 1); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      const standings = useMemo(() => {
        if (!data) return [];
        if (data.standings) return data.standings;
        return calculateStandings(data.teams, data.weeks, data.scheduleMatchup1 || {}, data.scheduleMatchup2 || {});
      }, [data]);

      const projections = useMemo(() => {
        if (!data || !standings.length) return [];
        const weeksLeft = CONFIG.regularSeasonWeeks - (data.weeks?.length || 0);
        return standings.map((team, idx) => ({
          ...team,
          maxPossible: team.totalVP + (weeksLeft * 6),
          seed: idx + 1
        }));
      }, [standings, data]);

      if (loading) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center">Loading...</div>;
      if (!data) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center">Failed to load</div>;

      const tabs = [
        { id: 'standings', label: 'Standings' },
        { id: 'matchups', label: 'Matchups' },
        { id: 'keepers', label: 'Keepers' }
      ];

      return (
        <div className="min-h-screen bg-slate-900 text-white p-3 md:p-6">
          <div className="max-w-4xl mx-auto">
            <div className="text-center mb-6">
              <h1 className="text-2xl md:text-3xl font-bold bg-gradient-to-r from-yellow-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">
                {data.leagueName}
              </h1>
              <p className="text-slate-400 mt-1">{data.year} Season</p>
            </div>

            <div className="flex gap-1 mb-6 bg-slate-800 p-1 rounded-lg">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setView(tab.id)}
                  className={`flex-1 py-2 px-3 rounded-md text-sm font-medium ${view === tab.id ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}>
                  {tab.label}
                </button>
              ))}
            </div>

            <div className="bg-slate-800/30 rounded-xl p-4 md:p-6 border border-slate-700">
              {view === 'standings' && <Standings projections={projections} hasData={data.weeks && data.weeks.length > 0} />}
              {view === 'matchups' && <WeeklyView data={data} selectedWeek={selectedWeek} setSelectedWeek={setSelectedWeek} />}
              {view === 'keepers' && <KeeperTracker teams={data.teams} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
